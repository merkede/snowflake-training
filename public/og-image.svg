<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#29b5e8"/>
      <stop offset="100%" style="stop-color:#56c4ed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e293b" stroke-width="1" opacity="0.5"/>

  <!-- Logo snowflake icon -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="url(#accent)"/>
  <text x="116" y="130" font-family="Arial" font-size="40" fill="white" text-anchor="middle">❄</text>

  <!-- Brand label -->
  <text x="80" y="210" font-family="Inter, Arial, sans-serif" font-size="18" fill="#29b5e8" font-weight="600" letter-spacing="2">SNOWFLAKE TRAINING · SNOWPRO CORE</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="Inter, Arial, sans-serif" font-size="72" fill="white" font-weight="800">Snowflake</text>
  <text x="80" y="395" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">
    <tspan fill="url(#accent)">Training Hub.</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="460" font-family="Inter, Arial, sans-serif" font-size="24" fill="#94a3b8">COF-C02 Certification Prep · by Hamzah Javaid</text>

  <!-- Stats row -->
  <rect x="80" y="510" width="180" height="60" rx="12" fill="#1e293b"/>
  <text x="170" y="536" font-family="Inter, Arial, sans-serif" font-size="22" fill="#29b5e8" font-weight="800" text-anchor="middle">23</text>
  <text x="170" y="558" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Modules</text>

  <rect x="280" y="510" width="180" height="60" rx="12" fill="#1e293b"/>
  <text x="370" y="536" font-family="Inter, Arial, sans-serif" font-size="22" fill="#29b5e8" font-weight="800" text-anchor="middle">100</text>
  <text x="370" y="558" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Exam Questions</text>

  <rect x="480" y="510" width="180" height="60" rx="12" fill="#1e293b"/>
  <text x="570" y="536" font-family="Inter, Arial, sans-serif" font-size="22" fill="#29b5e8" font-weight="800" text-anchor="middle">6</text>
  <text x="570" y="558" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Exam Domains</text>

  <!-- Right side decoration -->
  <circle cx="1050" cy="315" r="200" fill="none" stroke="#29b5e8" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="315" r="140" fill="none" stroke="#29b5e8" stroke-width="1" opacity="0.2"/>
  <circle cx="1050" cy="315" r="80" fill="none" stroke="#29b5e8" stroke-width="1" opacity="0.3"/>
  <text x="1050" y="330" font-family="Arial" font-size="80" fill="#29b5e8" text-anchor="middle" opacity="0.4">❄</text>
</svg>
