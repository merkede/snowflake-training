<svg width="820" height="420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <rect width="820" height="420" fill="#f8fafc" rx="12"/>

  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">VARIANT Data Type: Path Access and Type Casting</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#64748b">VARIANT stores any JSON/semi-structured data — access nested fields using colon (:) and dot-path notation</text>

  <!-- Left: JSON Document -->
  <rect x="20" y="60" width="340" height="320" fill="#0f172a" rx="10"/>
  <text x="185" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">-- VARIANT column value (row in orders table)</text>

  <!-- JSON lines with syntax highlighting -->
  <text x="36" y="102" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#e2e8f0">{</text>
  <text x="36" y="118" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">  "customer"</text><text x="155" y="118" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: {</text>
  <text x="36" y="134" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">    "id"</text><text x="115" y="134" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: </text><text x="130" y="134" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#fbbf24">1001</text><text x="162" y="134" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">,</text>
  <text x="36" y="150" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">    "name"</text><text x="127" y="150" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: </text><text x="142" y="150" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#86efac">"Acme Corp"</text><text x="236" y="150" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">,</text>
  <text x="36" y="166" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">    "region"</text><text x="139" y="166" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: </text><text x="154" y="166" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#86efac">"EU"</text>
  <text x="36" y="182" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">  },</text>
  <text x="36" y="198" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">  "orders"</text><text x="139" y="198" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: [</text>
  <text x="36" y="214" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">    {</text>
  <text x="36" y="230" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">      "id"</text><text x="115" y="230" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: </text><text x="130" y="230" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#fbbf24">501</text><text x="158" y="230" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">,</text>
  <text x="36" y="246" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">      "amount"</text><text x="145" y="246" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: </text><text x="160" y="246" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#fbbf24">250.00</text><text x="210" y="246" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">,</text>
  <text x="36" y="262" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#f87171">      "status"</text><text x="145" y="262" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">: </text><text x="160" y="262" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#86efac">"shipped"</text>
  <text x="36" y="278" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">    }</text>
  <text x="36" y="294" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#94a3b8">  ]</text>
  <text x="36" y="310" font-size="11" font-family="'JetBrains Mono','Fira Code',monospace" fill="#e2e8f0">}</text>
  <text x="185" y="338" text-anchor="middle" font-size="10" fill="#64748b">Column: data VARIANT</text>

  <!-- Right: Access patterns -->
  <rect x="370" y="60" width="430" height="320" fill="#fff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="585" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">SQL Path Access Patterns</text>

  <!-- Pattern 1 -->
  <rect x="382" y="90" width="406" height="52" fill="#eff6ff" rx="6"/>
  <text x="392" y="107" font-size="10" font-weight="700" fill="#1e40af">1. Colon path: data:customer.name</text>
  <text x="392" y="121" font-size="10" font-family="'JetBrains Mono','Fira Code',monospace" fill="#334155">SELECT data:customer.name FROM orders;</text>
  <text x="392" y="134" font-size="9" fill="#64748b">→ Returns VARIANT "Acme Corp" (with quotes)</text>

  <!-- Pattern 2 -->
  <rect x="382" y="148" width="406" height="52" fill="#f0fdf4" rx="6"/>
  <text x="392" y="165" font-size="10" font-weight="700" fill="#166534">2. Type cast: ::VARCHAR removes quotes</text>
  <text x="392" y="179" font-size="10" font-family="'JetBrains Mono','Fira Code',monospace" fill="#334155">SELECT data:customer.name::VARCHAR;</text>
  <text x="392" y="192" font-size="9" fill="#64748b">→ Returns TEXT Acme Corp (cast, no quotes)</text>

  <!-- Pattern 3 -->
  <rect x="382" y="206" width="406" height="52" fill="#fdf4ff" rx="6"/>
  <text x="392" y="223" font-size="10" font-weight="700" fill="#6b21a8">3. Array index: orders[0]</text>
  <text x="392" y="237" font-size="10" font-family="'JetBrains Mono','Fira Code',monospace" fill="#334155">SELECT data:orders[0].amount::FLOAT;</text>
  <text x="392" y="250" font-size="9" fill="#64748b">→ Returns FLOAT 250.0 (first order amount)</text>

  <!-- Pattern 4 -->
  <rect x="382" y="264" width="406" height="52" fill="#fff7ed" rx="6"/>
  <text x="392" y="281" font-size="10" font-weight="700" fill="#c2410c">4. Bracket notation: data['customer']['id']</text>
  <text x="392" y="295" font-size="10" font-family="'JetBrains Mono','Fira Code',monospace" fill="#334155">SELECT data['customer']['id']::INT;</text>
  <text x="392" y="308" font-size="9" fill="#64748b">→ Returns INTEGER 1001 (equivalent to colon path)</text>

  <!-- Pattern 5 - FLATTEN -->
  <rect x="382" y="322" width="406" height="52" fill="#fef9c3" rx="6"/>
  <text x="392" y="339" font-size="10" font-weight="700" fill="#92400e">5. FLATTEN: explode nested arrays to rows</text>
  <text x="392" y="353" font-size="10" font-family="'JetBrains Mono','Fira Code',monospace" fill="#334155">SELECT o.value:amount::FLOAT AS amt</text>
  <text x="392" y="365" font-size="10" font-family="'JetBrains Mono','Fira Code',monospace" fill="#334155">FROM orders, LATERAL FLATTEN(data:orders) o;</text>

  <!-- Bottom tips -->
  <rect x="20" y="390" width="780" height="24" fill="#164365" rx="6"/>
  <text x="410" y="406" text-anchor="middle" font-size="10" fill="#fff">Key types: PARSE_JSON(str) → VARIANT · TRY_PARSE_JSON() (null on failure) · IS_NULL_VALUE() · TYPEOF() · OBJECT_CONSTRUCT()</text>
</svg>
