<svg width="820" height="420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <rect width="820" height="420" fill="#f8fafc" rx="12"/>

  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Snowflake Stage Architecture: Full Hierarchy</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#64748b">Stages are named locations where files reside before loading into or after unloading from Snowflake</text>

  <!-- Root node -->
  <rect x="315" y="62" width="190" height="40" fill="#164365" rx="8"/>
  <text x="410" y="87" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Snowflake Stages</text>

  <!-- Branch line to Internal and External -->
  <line x1="410" y1="102" x2="410" y2="120" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="210" y1="120" x2="610" y2="120" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="210" y1="120" x2="210" y2="136" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="610" y1="120" x2="610" y2="136" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Internal Stages -->
  <rect x="80"  y="136" width="260" height="36" fill="#3b82f6" rx="8"/>
  <text x="210" y="159" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🏠 Internal Stages</text>

  <!-- Internal branch -->
  <line x1="210" y1="172" x2="210" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="100" y1="190" x2="320" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="100" y1="190" x2="100" y2="204" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="210" y1="190" x2="210" y2="204" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="320" y1="190" x2="320" y2="204" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- User Stage -->
  <rect x="28"  y="204" width="144" height="116" fill="#dbeafe" rx="8" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="100" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">@~ User Stage</text>
  <text x="100" y="240" text-anchor="middle" font-size="10" fill="#334155">Auto-created per user</text>
  <text x="100" y="256" text-anchor="middle" font-size="10" fill="#334155">Not shareable</text>
  <text x="100" y="272" text-anchor="middle" font-size="10" fill="#334155">Snowflake-managed</text>
  <rect x="38"  y="284" width="124" height="30" fill="#bfdbfe" rx="4"/>
  <text x="100" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">PUT / LIST @~</text>
  <text x="100" y="311" text-anchor="middle" font-size="9" fill="#1e40af">GET @~/file.csv</text>

  <!-- Table Stage -->
  <rect x="138" y="204" width="144" height="116" fill="#dcfce7" rx="8" stroke="#86efac" stroke-width="1.5"/>
  <text x="210" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">@%table Stage</text>
  <text x="210" y="240" text-anchor="middle" font-size="10" fill="#334155">Auto-created per table</text>
  <text x="210" y="256" text-anchor="middle" font-size="10" fill="#334155">Not shareable</text>
  <text x="210" y="272" text-anchor="middle" font-size="10" fill="#334155">Snowflake-managed</text>
  <rect x="148" y="284" width="124" height="30" fill="#bbf7d0" rx="4"/>
  <text x="210" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">PUT / LIST @%orders</text>
  <text x="210" y="311" text-anchor="middle" font-size="9" fill="#166534">COPY INTO orders</text>

  <!-- Named Internal Stage -->
  <rect x="248" y="204" width="144" height="116" fill="#f3e8ff" rx="8" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="320" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">@named (Internal)</text>
  <text x="320" y="240" text-anchor="middle" font-size="10" fill="#334155">CREATE STAGE required</text>
  <text x="320" y="256" text-anchor="middle" font-size="10" fill="#334155">Shareable across roles</text>
  <text x="320" y="272" text-anchor="middle" font-size="10" fill="#334155">Snowflake-managed</text>
  <rect x="258" y="284" width="124" height="30" fill="#e9d5ff" rx="4"/>
  <text x="320" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#6b21a8">PUT → @my_stage</text>
  <text x="320" y="311" text-anchor="middle" font-size="9" fill="#6b21a8">COPY INTO … FROM @my_stage</text>

  <!-- External Stages -->
  <rect x="480" y="136" width="260" height="36" fill="#f97316" rx="8"/>
  <text x="610" y="159" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">☁ External Stages</text>

  <!-- External branch -->
  <line x1="610" y1="172" x2="610" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="500" y1="190" x2="720" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="500" y1="190" x2="500" y2="204" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="610" y1="190" x2="610" y2="204" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="720" y1="190" x2="720" y2="204" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- S3 -->
  <rect x="428" y="204" width="144" height="116" fill="#fff7ed" rx="8" stroke="#fdba74" stroke-width="1.5"/>
  <text x="500" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">S3 External</text>
  <text x="500" y="240" text-anchor="middle" font-size="10" fill="#334155">URL = 's3://bucket/'</text>
  <text x="500" y="256" text-anchor="middle" font-size="10" fill="#334155">Auth: Storage Integration</text>
  <text x="500" y="272" text-anchor="middle" font-size="10" fill="#334155">or AWS_KEY_ID/SECRET</text>
  <rect x="438" y="284" width="124" height="30" fill="#ffedd5" rx="4"/>
  <text x="500" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c">No PUT needed</text>
  <text x="500" y="311" text-anchor="middle" font-size="9" fill="#c2410c">Files already in bucket</text>

  <!-- Azure -->
  <rect x="538" y="204" width="144" height="116" fill="#fef3c7" rx="8" stroke="#fde047" stroke-width="1.5"/>
  <text x="610" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Azure Blob External</text>
  <text x="610" y="240" text-anchor="middle" font-size="10" fill="#334155">URL = 'azure://acct/'</text>
  <text x="610" y="256" text-anchor="middle" font-size="10" fill="#334155">Auth: Storage Integration</text>
  <text x="610" y="272" text-anchor="middle" font-size="10" fill="#334155">or AZURE_SAS_TOKEN</text>
  <rect x="548" y="284" width="124" height="30" fill="#fef9c3" rx="4"/>
  <text x="610" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">COPY INTO tbl</text>
  <text x="610" y="311" text-anchor="middle" font-size="9" fill="#92400e">FROM @azure_stage/path/</text>

  <!-- GCS -->
  <rect x="648" y="204" width="144" height="116" fill="#f0fdf4" rx="8" stroke="#86efac" stroke-width="1.5"/>
  <text x="720" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">GCS External</text>
  <text x="720" y="240" text-anchor="middle" font-size="10" fill="#334155">URL = 'gcs://bucket/'</text>
  <text x="720" y="256" text-anchor="middle" font-size="10" fill="#334155">Auth: Storage Integration</text>
  <text x="720" y="272" text-anchor="middle" font-size="10" fill="#334155">(service account key)</text>
  <rect x="658" y="284" width="124" height="30" fill="#dcfce7" rx="4"/>
  <text x="720" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">STORAGE_INTEGRATION</text>
  <text x="720" y="311" text-anchor="middle" font-size="9" fill="#166534">= gcp_integration</text>

  <!-- Bottom note -->
  <rect x="20" y="334" width="780" height="72" fill="#fff" rx="8" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="410" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Stage Operations: Universal Commands</text>
  <text x="30"  y="369" font-size="10" fill="#334155">LIST @stage_name;          — List files   · REMOVE @stage_name/path/file.csv;  — Delete file</text>
  <text x="30"  y="384" font-size="10" fill="#334155">GET @stage_name/file.csv file:///tmp/;  — Download file (SnowSQL only, internal stages)</text>
  <text x="30"  y="399" font-size="10" fill="#334155">SELECT * FROM DIRECTORY(@stage);        — Directory table for external stages (requires REFRESH)</text>
</svg>
