<svg width="820" height="380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <rect width="820" height="380" fill="#f8fafc" rx="12"/>

  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Data Unloading Flow: Snowflake → External Storage</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#64748b">COPY INTO @stage FROM table — the reverse of bulk loading, exports query results to staged files</text>

  <!-- Step 1: Snowflake Table / Query -->
  <rect x="20" y="68" width="155" height="190" fill="#fff7ed" rx="8" stroke="#fdba74" stroke-width="2"/>
  <rect x="20" y="68" width="155" height="28" fill="#f97316" rx="8"/>
  <rect x="20" y="87" width="155" height="9"  fill="#f97316"/>
  <text x="98"  y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Source Table / Query</text>
  <!-- Mini table -->
  <rect x="33"  y="104" width="129" height="100" fill="#fef9c3" rx="4" stroke="#fde047" stroke-width="1"/>
  <line x1="33" y1="118" x2="162" y2="118" stroke="#fbbf24" stroke-width="1"/>
  <line x1="33" y1="132" x2="162" y2="132" stroke="#fde68a" stroke-width="0.5"/>
  <line x1="33" y1="146" x2="162" y2="146" stroke="#fde68a" stroke-width="0.5"/>
  <line x1="33" y1="160" x2="162" y2="160" stroke="#fde68a" stroke-width="0.5"/>
  <line x1="33" y1="174" x2="162" y2="174" stroke="#fde68a" stroke-width="0.5"/>
  <line x1="98" y1="104" x2="98"  y2="204" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="65"  y="114" text-anchor="middle" font-size="8" fill="#92400e">order_id</text>
  <text x="130" y="114" text-anchor="middle" font-size="8" fill="#92400e">amount</text>
  <text x="65"  y="128" text-anchor="middle" font-size="8" fill="#334155">1001</text><text x="130" y="128" text-anchor="middle" font-size="8" fill="#334155">£250</text>
  <text x="65"  y="142" text-anchor="middle" font-size="8" fill="#334155">1002</text><text x="130" y="142" text-anchor="middle" font-size="8" fill="#334155">£80</text>
  <text x="65"  y="156" text-anchor="middle" font-size="8" fill="#334155">1003</text><text x="130" y="156" text-anchor="middle" font-size="8" fill="#334155">£400</text>
  <text x="98"  y="218" text-anchor="middle" font-size="10" fill="#c2410c">SELECT * or</text>
  <text x="98"  y="232" text-anchor="middle" font-size="10" fill="#c2410c">filtered query</text>
  <text x="98"  y="248" text-anchor="middle" font-size="10" fill="#c2410c">result set</text>

  <!-- Arrow 1: COPY INTO -->
  <line x1="175" y1="163" x2="215" y2="163" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGy)"/>
  <text x="195" y="153" text-anchor="middle" font-size="9" fill="#164365">COPY</text>
  <text x="195" y="165" text-anchor="middle" font-size="9" fill="#164365">INTO</text>
  <text x="195" y="177" text-anchor="middle" font-size="9" fill="#164365">@stage</text>

  <!-- Step 2: COPY INTO Command -->
  <rect x="215" y="68" width="190" height="190" fill="#eff6ff" rx="8" stroke="#93c5fd" stroke-width="2"/>
  <rect x="215" y="68" width="190" height="28" fill="#164365" rx="8"/>
  <rect x="215" y="87" width="190" height="9"  fill="#164365"/>
  <text x="310" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">COPY INTO @stage</text>

  <rect x="228" y="104" width="164" height="140" fill="#0f172a" rx="6"/>
  <text x="238" y="120" font-size="8" fill="#94a3b8">COPY INTO @my_stage/exports/</text>
  <text x="238" y="134" font-size="8" fill="#94a3b8">FROM (</text>
  <text x="238" y="148" font-size="8" fill="#29b5e8">  SELECT order_id, amount</text>
  <text x="238" y="162" font-size="8" fill="#29b5e8">  FROM orders</text>
  <text x="238" y="176" font-size="8" fill="#29b5e8">  WHERE year = 2024</text>
  <text x="238" y="190" font-size="8" fill="#94a3b8">)</text>
  <text x="238" y="204" font-size="8" fill="#94a3b8">FILE_FORMAT = (TYPE='CSV')</text>
  <text x="238" y="218" font-size="8" fill="#94a3b8">MAX_FILE_SIZE = 104857600</text>
  <text x="238" y="232" font-size="8" fill="#94a3b8">OVERWRITE = FALSE;</text>

  <!-- Arrow 2: to Stage -->
  <line x1="405" y1="163" x2="445" y2="163" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGy)"/>

  <!-- Step 3: Stage (Internal or External) -->
  <rect x="445" y="68" width="175" height="190" fill="#f0fdf4" rx="8" stroke="#86efac" stroke-width="2"/>
  <rect x="445" y="68" width="175" height="28" fill="#22c55e" rx="8"/>
  <rect x="445" y="87" width="175" height="9"  fill="#22c55e"/>
  <text x="532" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Stage (output files)</text>

  <text x="532" y="110" text-anchor="middle" font-size="10" fill="#166534">Snowflake writes parallel</text>
  <text x="532" y="124" text-anchor="middle" font-size="10" fill="#166534">output files to stage:</text>

  <rect x="460" y="134" width="145" height="22" fill="#dcfce7" rx="4"/>
  <text x="532" y="149" text-anchor="middle" font-size="10" fill="#166534">data_0_0_0.csv.gz</text>

  <rect x="460" y="160" width="145" height="22" fill="#dcfce7" rx="4"/>
  <text x="532" y="175" text-anchor="middle" font-size="10" fill="#166534">data_0_0_1.csv.gz</text>

  <rect x="460" y="186" width="145" height="22" fill="#dcfce7" rx="4"/>
  <text x="532" y="201" text-anchor="middle" font-size="10" fill="#166534">data_0_0_2.csv.gz</text>

  <text x="532" y="228" text-anchor="middle" font-size="9" fill="#475569">Splits output across</text>
  <text x="532" y="240" text-anchor="middle" font-size="9" fill="#475569">warehouse nodes (parallel)</text>

  <!-- Arrow 3: to Cloud / Download -->
  <line x1="620" y1="163" x2="660" y2="163" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGy)"/>
  <text x="640" y="153" text-anchor="middle" font-size="9" fill="#475569">GET or</text>
  <text x="640" y="165" text-anchor="middle" font-size="9" fill="#475569">cloud</text>
  <text x="640" y="177" text-anchor="middle" font-size="9" fill="#475569">access</text>

  <!-- Step 4: Destination -->
  <rect x="660" y="68" width="145" height="190" fill="#fdf4ff" rx="8" stroke="#d8b4fe" stroke-width="2"/>
  <rect x="660" y="68" width="145" height="28" fill="#a855f7" rx="8"/>
  <rect x="660" y="87" width="145" height="9"  fill="#a855f7"/>
  <text x="732" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Destination</text>

  <text x="732" y="112" text-anchor="middle" font-size="10" fill="#6b21a8">External stage →</text>
  <text x="732" y="126" text-anchor="middle" font-size="9" fill="#334155">• S3 bucket (native)</text>
  <text x="732" y="140" text-anchor="middle" font-size="9" fill="#334155">• Azure Blob container</text>
  <text x="732" y="154" text-anchor="middle" font-size="9" fill="#334155">• GCS bucket</text>

  <line x1="674" y1="168" x2="790" y2="168" stroke="#e2e8f0" stroke-width="1"/>
  <text x="732" y="182" text-anchor="middle" font-size="10" fill="#6b21a8">Internal stage →</text>
  <text x="732" y="196" text-anchor="middle" font-size="9" fill="#334155">GET @stage/file.csv</text>
  <text x="732" y="210" text-anchor="middle" font-size="9" fill="#334155">file:///local/path/</text>
  <text x="732" y="224" text-anchor="middle" font-size="9" fill="#334155">(SnowSQL only)</text>
  <text x="732" y="244" text-anchor="middle" font-size="8" fill="#94a3b8">or use Snowsight UI</text>

  <!-- Key options table -->
  <rect x="20" y="272" width="780" height="96" fill="#fff" rx="8" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="410" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Key COPY INTO @location Options</text>
  <text x="30"  y="308" font-size="10" fill="#334155">FILE_FORMAT — format of output files (CSV, JSON, Parquet, ORC) · COMPRESSION — GZIP (default), BROTLI, NONE</text>
  <text x="30"  y="323" font-size="10" fill="#334155">MAX_FILE_SIZE — max bytes per output file (default: 16 MB) · SINGLE = TRUE — force all rows into one file</text>
  <text x="30"  y="338" font-size="10" fill="#334155">OVERWRITE = TRUE — replace existing files · HEADER = TRUE — write column names as first row (CSV only)</text>
  <text x="30"  y="354" font-size="10" fill="#334155">PARTITION BY — partition output into folders by column value, e.g. PARTITION BY (year, month)</text>

  <defs>
    <marker id="aGy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 Z" fill="#94a3b8"/></marker>
  </defs>
</svg>
