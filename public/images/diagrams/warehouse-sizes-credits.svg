<svg width="820" height="460" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <rect width="820" height="460" fill="#f8fafc" rx="12"/>

  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Warehouse Sizes and Credit Consumption</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#64748b">Each size doubles compute resources and credits per hour · Minimum 60-second billing per resume</text>

  <!-- Y-axis label -->
  <text x="18" y="250" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90,18,250)">Credits / Hour</text>

  <!-- Axes -->
  <line x1="70" y1="58" x2="70" y2="370" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="70" y1="370" x2="800" y2="370" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Y-axis ticks -->
  <text x="62" y="372" text-anchor="end" font-size="10" fill="#64748b">0</text>
  <text x="62" y="316" text-anchor="end" font-size="10" fill="#64748b">32</text>
  <text x="62" y="262" text-anchor="end" font-size="10" fill="#64748b">64</text>
  <text x="62" y="208" text-anchor="end" font-size="10" fill="#64748b">96</text>
  <text x="62" y="154" text-anchor="end" font-size="10" fill="#64748b">128</text>
  <line x1="68" y1="316" x2="72" y2="316" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="68" y1="262" x2="72" y2="262" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="68" y1="208" x2="72" y2="208" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="68" y1="154" x2="72" y2="154" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="70" y1="316" x2="800" y2="316" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="70" y1="262" x2="800" y2="262" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="70" y1="208" x2="800" y2="208" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="70" y1="154" x2="800" y2="154" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Scale: 128 credits = 216px (370-154), so 1 credit = 1.6875px -->
  <!-- XS = 1 credit → height = 1.7px (round to 4 for visibility) -->
  <!-- S = 2 → 3.4 → 6 -->
  <!-- M = 4 → 6.75 → 10 -->
  <!-- L = 8 → 13.5 → 16 -->
  <!-- XL = 16 → 27 -->
  <!-- 2XL = 32 → 54 -->
  <!-- 3XL = 64 → 108 -->
  <!-- 4XL = 128 → 216 -->

  <!-- Color gradient from light to dark Snowflake blue -->
  <!-- XS -->
  <rect x="82"  y="364" width="72" height="6"   fill="#bae6fd" rx="3 3 0 0" stroke="#7dd3fc" stroke-width="1"/>
  <text x="118" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">1</text>

  <!-- S -->
  <rect x="182" y="358" width="72" height="12"  fill="#7dd3fc" rx="3 3 0 0" stroke="#38bdf8" stroke-width="1"/>
  <text x="218" y="352" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">2</text>

  <!-- M -->
  <rect x="282" y="350" width="72" height="20"  fill="#38bdf8" rx="3 3 0 0" stroke="#0ea5e9" stroke-width="1"/>
  <text x="318" y="344" text-anchor="middle" font-size="10" font-weight="700" fill="#0c4a6e">4</text>

  <!-- L -->
  <rect x="382" y="337" width="72" height="33"  fill="#0ea5e9" rx="3 3 0 0" stroke="#0284c7" stroke-width="1"/>
  <text x="418" y="331" text-anchor="middle" font-size="10" font-weight="700" fill="#0c4a6e">8</text>

  <!-- XL -->
  <rect x="482" y="313" width="72" height="57"  fill="#0284c7" rx="3 3 0 0" stroke="#0369a1" stroke-width="1"/>
  <text x="518" y="307" text-anchor="middle" font-size="10" font-weight="700" fill="#0c4a6e">16</text>

  <!-- 2XL -->
  <rect x="582" y="261" width="72" height="109" fill="#0369a1" rx="3 3 0 0" stroke="#075985" stroke-width="1"/>
  <text x="618" y="255" text-anchor="middle" font-size="10" font-weight="700" fill="#0c4a6e">32</text>

  <!-- 3XL -->
  <rect x="682" y="153" width="72" height="217" fill="#075985" rx="3 3 0 0" stroke="#164365" stroke-width="1"/>
  <text x="718" y="147" text-anchor="middle" font-size="10" font-weight="700" fill="#075985">64</text>

  <!-- 4XL label off-chart -->
  <text x="730" y="100" text-anchor="start" font-size="10" font-weight="600" fill="#64748b">4XL = 128 cr/hr</text>
  <text x="730" y="114" text-anchor="start" font-size="10" fill="#94a3b8">(extends off chart)</text>
  <line x1="724" y1="118" x2="724" y2="153" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- X-axis labels -->
  <text x="118" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">XS</text>
  <text x="218" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">S</text>
  <text x="318" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">M</text>
  <text x="418" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">L</text>
  <text x="518" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">XL</text>
  <text x="618" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">2XL</text>
  <text x="718" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">3XL</text>

  <!-- Use-case bands -->
  <rect x="82"  y="400" width="386" height="28" fill="#dbeafe" rx="4"/>
  <text x="275" y="418" text-anchor="middle" font-size="10" fill="#1e40af">← BI dashboards, ad-hoc queries, development (XS–XL)</text>

  <rect x="482" y="400" width="272" height="28" fill="#fce7f3" rx="4"/>
  <text x="618" y="418" text-anchor="middle" font-size="10" fill="#9d174d">← Batch ETL, ML training (XL–3XL)</text>

  <!-- Doubling annotation -->
  <rect x="120" y="432" width="560" height="22" fill="#164365" rx="6"/>
  <text x="400" y="447" text-anchor="middle" font-size="11" fill="#ffffff">Each size = 2× the compute nodes, 2× the credits, ~2× the performance for CPU-bound queries</text>
</svg>
